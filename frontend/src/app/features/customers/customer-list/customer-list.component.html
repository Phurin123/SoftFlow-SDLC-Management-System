<div class="space-y-6 animate-fade-in">
  <div class="page-header">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="page-title">Customers</h1>
        <p class="page-subtitle">Manage your customer relationships</p>
      </div>
      <button (click)="openModal()" class="btn-primary gap-2">
        <lucide-icon name="plus" class="w-4 h-4"></lucide-icon>
        Add Customer
      </button>
    </div>
  </div>

  <app-data-table
    [columns]="columns"
    [loading]="loading()"
    title="All Customers"
    subtitle="Manage customer records and view linked projects"
    searchPlaceholder="Search by name, tax ID, contact..."
    (view)="onView($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)">
  </app-data-table>
</div>
