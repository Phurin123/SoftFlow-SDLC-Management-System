<div class="space-y-6 animate-fade-in">
  <div class="page-header">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="page-title">Projects</h1>
        <p class="page-subtitle">Manage all software development projects</p>
      </div>
      <button class="btn-primary gap-2">
        <lucide-icon name="plus" class="w-4 h-4"></lucide-icon>
        New Project
      </button>
    </div>
  </div>

  <app-data-table
    #projectTable
    [columns]="columns"
    [loading]="loading()"
    title="All Projects"
    subtitle="Track projects across the SDLC pipeline"
    searchPlaceholder="Search by code, name, PM..."
    (view)="onView($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)">
  </app-data-table>
</div>
